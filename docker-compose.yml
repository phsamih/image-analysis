version: "3.9"

services:
  backend:
    build: ./backend
    container_name: satellite_ai_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend/app/uploads:/app/app/uploads
      - ./backend/app/static/results:/app/app/static/results
      - ./backend/app/projects:/app/app/projects
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ""
    container_name: satellite_ai_frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:stable-alpine
    container_name: satellite_ai_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
